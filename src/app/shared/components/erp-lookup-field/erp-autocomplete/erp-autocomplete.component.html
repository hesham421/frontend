<div class="erp-autocomplete position-relative">
  <!-- Search Input -->
  <div class="erp-autocomplete__row">
    <avl-input
      class="erp-autocomplete__input"
      [placeholder]="(config.placeholderKey || 'LOOKUP.SEARCH_PLACEHOLDER') | translate"
      [value]="displayValue"
      (valueChange)="onInputChange($event)"
      (focusin)="onFocus()"
      (keydown)="onKeyDown($event)"
    />
    <!-- Clear Button -->
    @if (displayValue) {
      <avl-icon-button
        icon="ti ti-x"
        variant="ghost"
        size="sm"
        [label]="'LOOKUP.CLEAR' | translate"
        (clicked)="clearInput()"
      />
    }
    <!-- Loading Indicator -->
    @if (isLoading()) {
      <span class="erp-autocomplete__spinner" aria-hidden="true"></span>
    }
  </div>

  <!-- Dropdown Results -->
  @if (isOpen()) {
    <ul class="erp-autocomplete__dropdown avl-dropdown__panel position-absolute w-100" role="listbox">
      @for (item of results(); track trackByItemId($index, item)) {
        <li
          class="avl-dropdown__item"
          [class.active]="highlightedIndex() === $index"
          role="option"
          [attr.aria-selected]="highlightedIndex() === $index"
          (click)="selectItem(item)"
          (mouseenter)="highlightedIndex.set($index)"
        >
          {{ item.display }}
        </li>
      }

      @if (!hasResults() && !isLoading()) {
        <li class="avl-dropdown__item erp-autocomplete__empty">
          {{ 'LOOKUP.NO_RESULTS' | translate }}
        </li>
      }
    </ul>
  }
</div>
