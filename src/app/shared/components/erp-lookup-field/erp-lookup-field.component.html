@if (config.mode === 'quick') {
  <!-- Quick Mode: Inline Autocomplete -->
  <erp-autocomplete
    [config]="config"
    [displayValue]="displayText()"
    (itemSelected)="onAutocompleteSelected($event)"
    (cleared)="onAutocompleteCleared()"
  ></erp-autocomplete>
} @else {
  <!-- Advanced Mode: Input with Dialog Trigger -->
  <div class="erp-lookup-field__row">
    <avl-input
      class="erp-lookup-field__input"
      iconLeft="ti ti-search"
      [value]="displayText()"
      [placeholder]="(config.placeholderKey || 'LOOKUP.SEARCH_PLACEHOLDER') | translate"
      [disabled]="isDisabled()"
      [readOnly]="true"
    />
    <!-- Search Button (opens dialog) -->
    <avl-icon-button
      icon="ti ti-search"
      variant="outline"
      [disabled]="isDisabled()"
      [label]="'LOOKUP.OPEN_DIALOG' | translate"
      (clicked)="openDialog()"
    />
    <!-- Clear Button -->
    @if (selectedId() && !isDisabled()) {
      <avl-icon-button
        icon="ti ti-x"
        variant="outline"
        [label]="'LOOKUP.CLEAR' | translate"
        (clicked)="clearSelection()"
      />
    }
  </div>
}
