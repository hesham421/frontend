<avl-empty-state
  [icon]="icon"
  [title]="titleKey ? (titleKey | translate) : undefined"
  [message]="messageKey ? (messageKey | translate) : undefined"
>
  @if (actionLabelKey) {
    <avl-button empty-state-action variant="primary" (clicked)="actionClicked.emit()">
      {{ actionLabelKey | translate }}
    </avl-button>
  }
</avl-empty-state>
