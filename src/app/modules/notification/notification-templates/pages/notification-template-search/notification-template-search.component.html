<app-card [cardTitle]="'NOTIFICATION_TEMPLATES.TITLE' | translate" [padding]="0">
  <div class="card-header-right">
    <avl-button
      variant="accent"
      size="sm"
      iconLeft="ti ti-plus"
      erpPermission="PERM_NOTIFICATION_TEMPLATE_CREATE"
      (clicked)="onCreateNew()"
    >
      {{ 'NOTIFICATION_TEMPLATES.CREATE' | translate }}
    </avl-button>
  </div>

  @if (hasError()) {
    <erp-empty-state
      titleKey="ERRORS.OPERATION_FAILED"
      [messageKey]="facade.error() || 'ERRORS.TRY_AGAIN'"
    ></erp-empty-state>
  } @else {
    <div class="position-relative">
      @if (!isLoading() && rowData().length === 0) {
        <div class="p-3">
          <erp-empty-state icon="ti ti-template" titleKey="COMMON.NO_DATA" messageKey="TABLE.NO_ROWS" />
        </div>
      } @else {
        <ag-grid-angular
          style="width: 100%; height: calc(100vh - 311px)"
          [columnDefs]="columnDefs()"
          [defaultColDef]="defaultColDef"
          [gridOptions]="gridOptions()"
          [theme]="theme()"
          [rowData]="rowData()"
          [localeText]="agLocaleText()"
          (gridReady)="onGridReady($event)"
          (paginationChanged)="onPaginationChanged()"
        />
      }

      @if (isLoading()) {
        <div class="position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center"
             style="background: rgba(255,255,255,0.6); z-index: 2;">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">{{ 'COMMON.LOADING' | translate }}</span>
          </div>
        </div>
      }
    </div>
  }
</app-card>
