<app-card [cardTitle]="'NOTIFICATIONS.HISTORY_TITLE' | translate" [padding]="0">
  <div class="row g-2 align-items-end px-3 pt-3">
    <div class="col-md-3">
      <avl-select
        [label]="'NOTIFICATIONS.TYPE' | translate"
        [options]="channelOptions()"
        [value]="filterTypeId()"
        [placeholder]="'COMMON.ALL' | translate"
        (valueChange)="filterTypeId.set($event)"
      />
    </div>
    <div class="col-md-3">
      <avl-select
        [label]="'NOTIFICATIONS.STATUS' | translate"
        [options]="statusOptions()"
        [value]="filterStatusId()"
        [placeholder]="'COMMON.ALL' | translate"
        (valueChange)="filterStatusId.set($event)"
      />
    </div>
    <div class="col-md-2">
      <label class="avl-field__label">{{ 'NOTIFICATIONS.DATE_FROM' | translate }}</label>
      <input type="date" class="form-control" [ngModel]="filterDateFrom()" (ngModelChange)="filterDateFrom.set($event)" />
    </div>
    <div class="col-md-2">
      <label class="avl-field__label">{{ 'NOTIFICATIONS.DATE_TO' | translate }}</label>
      <input type="date" class="form-control" [ngModel]="filterDateTo()" (ngModelChange)="filterDateTo.set($event)" />
    </div>
    <div class="col-md-2 d-flex gap-2">
      <avl-button variant="primary" size="sm" (clicked)="onSearch()">{{ 'COMMON.SEARCH' | translate }}</avl-button>
      <avl-button variant="ghost" size="sm" (clicked)="onClearFilters()">{{ 'COMMON.CLEAR' | translate }}</avl-button>
    </div>
  </div>

  @if (hasError()) {
    <erp-empty-state
      titleKey="ERRORS.OPERATION_FAILED"
      [messageKey]="facade.error() || 'ERRORS.TRY_AGAIN'"
    ></erp-empty-state>
  } @else {
    <div class="position-relative mt-3">
      @if (!isLoading() && rowData().length === 0) {
        <div class="p-3">
          <erp-empty-state icon="ti ti-bell-off" titleKey="COMMON.NO_DATA" messageKey="TABLE.NO_ROWS" />
        </div>
      } @else {
        <ag-grid-angular
          style="width: 100%; height: calc(100vh - 360px)"
          [columnDefs]="columnDefs()"
          [defaultColDef]="defaultColDef"
          [gridOptions]="gridOptions()"
          [theme]="theme()"
          [rowData]="rowData()"
          [localeText]="agLocaleText()"
          (gridReady)="onGridReady($event)"
          (paginationChanged)="onPaginationChanged()"
        />
      }

      @if (isLoading()) {
        <div class="position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center"
             style="background: rgba(255,255,255,0.6); z-index: 2;">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">{{ 'COMMON.LOADING' | translate }}</span>
          </div>
        </div>
      }
    </div>
  }
</app-card>
