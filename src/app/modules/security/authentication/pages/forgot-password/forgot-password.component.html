<div class="auth-main">
  <div class="auth-wrapper v3">
    <div class="auth-form">
      <div class="auth-header">
        <a href="javascript:"><img src="assets/images/logo-dark.svg" alt="theme logo" /></a>
      </div>
      <div class="card my-5">
        <div class="card-body p-30">
          <div class="d-flex justify-content-between align-items-end mb-4">
            <h3 class="mb-0"><b>Forgot Password</b></h3>
            <a [routerLink]="['/login']" class="link-primary">Back to Login</a>
          </div>
          <div class="mb-3">
            <avl-input label="Email Address" id="floatingInput" type="email" placeholder="Email Address" />
          </div>
          <p class="mt-4 text-sm text-muted">Do not forgot to check SPAM box.</p>
          <avl-button type="button" variant="primary" [block]="true">Send Password Reset Email</avl-button>
        </div>
      </div>
      <div class="auth-footer row">
        <div class="col my-1">
          <p class="m-0">
            Copyright ©
            <a href="https://codedthemes.com/" target="_blank">CodedThemes</a>
          </p>
        </div>
        <div class="col-auto my-1">
          <ul class="list-inline footer-link mb-0">
            <li class="list-inline-item"><a href="https://codedthemes.com/" target="_blank">Home</a></li>
            <li class="list-inline-item"><a href="https://codedthemes.com/privacy-policy/" target="_blank">Privacy Policy</a></li>
            <li class="list-inline-item"><a href="https://codedthemes.support-hub.io/" target="_blank">Contact us</a></li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
