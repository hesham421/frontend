<div class="auth-main">
  <div class="auth-wrapper v3">
    <div class="auth-form">
      <div class="auth-header">
        <a href="javascript:"><img src="assets/images/logo-dark.svg" alt="logo" /></a>
      </div>
      <app-card [showHeader]="false" [padding]="30" cardClass="my-5">
        <div class="d-flex justify-content-between align-items-end mb-4">
          <h3 class="mb-0"><b>Sign up</b></h3>
          <a [routerLink]="[this.authenticationService.isLoggedIn() ? '/auth/login' : '/login']" class="link-primary">
            Already have an account?
          </a>
        </div>
        <form (submit)="onSubmit($event)">
          <div class="row">
            <div class="col-md-6">
              <avl-input
                label="First Name*"
                id="firstName"
                [field]="registerForm.firstName"
                placeholder="First Name"
                [error]="(submitted() && registerForm.firstName().errors().length > 0) ? registerForm.firstName().errors()[0].message : undefined"
              />
            </div>
            <div class="col-md-6">
              <avl-input
                label="Last Name*"
                id="lastName"
                [field]="registerForm.lastName"
                placeholder="Last Name"
                [error]="(submitted() && registerForm.lastName().errors().length > 0) ? registerForm.lastName().errors()[0].message : undefined"
              />
            </div>
          </div>
          <div class="mb-3">
            <avl-input
              label="Email Address*"
              id="email"
              type="email"
              [field]="registerForm.email"
              placeholder="Email Address"
              [error]="(submitted() && registerForm.email().errors().length > 0) ? registerForm.email().errors()[0].message : undefined"
            />
          </div>
          <div class="mb-3">
            <avl-input
              label="Password"
              id="password"
              type="password"
              [field]="registerForm.password"
              placeholder="Password (min. 8 characters)"
              [error]="(submitted() && registerForm.password().errors().length > 0) ? registerForm.password().errors()[0].message : undefined"
            />
          </div>
          @if (error()) {
            <avl-alert tone="danger">{{ error() }}</avl-alert>
          }
          <p class="mt-4 text-sm text-muted">
            By Signing up, you agree to our
            <a href="javascript:" class="text-primary">Terms of Service</a>
            and
            <a href="javascript:" class="text-primary">Privacy Policy</a>
          </p>
          <avl-button type="submit" variant="primary" [block]="true" [loading]="loading()">
            {{ loading() ? 'Creating Account...' : 'Create Account' }}
          </avl-button>
        </form>
        <div class="saprator mt-3">
          <span>Sign up with</span>
        </div>
        <div class="row">
          <div class="col-4">
            <div class="d-grid">
              <button type="button" class="btn mt-2 btn-light-primary bg-light text-muted">
                <img src="assets/images/authentication/google.svg" alt="google logo" />
                <span class="d-none d-sm-inline-block">Google</span>
              </button>
            </div>
          </div>
          <div class="col-4">
            <div class="d-grid">
              <button type="button" class="btn mt-2 btn-light-primary bg-light text-muted">
                <img src="assets/images/authentication/twitter.svg" alt="twitter logo" />
                <span class="d-none d-sm-inline-block">Twitter</span>
              </button>
            </div>
          </div>
          <div class="col-4">
            <div class="d-grid">
              <button type="button" class="btn mt-2 btn-light-primary bg-light text-muted">
                <img src="assets/images/authentication/facebook.svg" alt="facebook logo" />
                <span class="d-none d-sm-inline-block">Facebook</span>
              </button>
            </div>
          </div>
        </div>
      </app-card>
      <div class="auth-footer row">
        <div class="col my-1">
          <p class="m-0">
            Copyright ©
            <a href="https://codedthemes.com/" target="_blank">CodedThemes</a>
          </p>
        </div>
        <div class="col-auto my-1">
          <ul class="list-inline footer-link mb-0">
            <li class="list-inline-item"><a href="https://codedthemes.com/" target="_blank">Home</a></li>
            <li class="list-inline-item"><a href="https://codedthemes.com/privacy-policy/" target="_blank">Privacy Policy</a></li>
            <li class="list-inline-item"><a href="https://codedthemes.support-hub.io/" target="_blank">Contact us</a></li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
