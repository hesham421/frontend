<!-- 
  ========================================
  UNIFIED BLUEPRINT - PAGE B: FORM PAGE
  ========================================
  TASK: TASK-FE-PAGES-001
  REQ:  FE-REQ-PAGES-001
  
  Purpose:
  - Creating or editing a single record
  
  Contains:
  - Form-only interface
  - Save / Cancel actions
  
  Prohibitions:
  - NO tables
  - NO search
  - NO modals
  
  Behavior:
  - Save → Persist → Notify → Navigate back
  - Cancel → Navigate back
-->

<app-card [cardTitle]="pageTitleKey | translate" [padding]="20">

  <div class="card-body">
    @if (loading) {
    <div class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">{{ 'COMMON.LOADING' | translate }}</span>
      </div>
    </div>
    } @else {
    <form [formGroup]="pageForm" (ngSubmit)="onSave()">
      <erp-section [titleKey]="pageTitleKey">
        <div class="row">
          <!-- Page Code -->
          <div class="col-md-6 mb-3">
            <erp-form-field
              labelKey="PAGES.PAGE_CODE"
              [control]="pageForm.get('pageCode')"
              [required]="true"
              [hintKey]="isEditMode ? 'PAGES.PAGE_CODE_READONLY_HINT' : undefined"
            >
              <avl-input id="pageCode" formControlName="pageCode" [mono]="true" />
            </erp-form-field>
          </div>

          <!-- Display Order -->
          <div class="col-md-6 mb-3">
            <erp-form-field
              labelKey="PAGES.DISPLAY_ORDER"
              [control]="pageForm.get('displayOrder')"
              [required]="true"
            >
              <avl-input id="displayOrder" type="number" formControlName="displayOrder" [mono]="true" min="0" />
            </erp-form-field>
          </div>

          <!-- Name (English) -->
          <div class="col-md-6 mb-3">
            <erp-form-field
              labelKey="PAGES.PAGE_NAME_EN"
              [control]="pageForm.get('nameEn')"
              [required]="true"
            >
              <avl-input id="nameEn" formControlName="nameEn" />
            </erp-form-field>
          </div>

          <!-- Name (Arabic) -->
          <div class="col-md-6 mb-3">
            <erp-form-field
              labelKey="PAGES.PAGE_NAME_AR"
              [control]="pageForm.get('nameAr')"
              [required]="true"
            >
              <avl-input id="nameAr" formControlName="nameAr" dir="rtl" />
            </erp-form-field>
          </div>

          <!-- Route -->
          <div class="col-md-6 mb-3">
            <erp-form-field
              labelKey="PAGES.ROUTE"
              [control]="pageForm.get('route')"
              [required]="true"
            >
              <avl-input id="route" formControlName="route" [mono]="true" />
            </erp-form-field>
          </div>

          <!-- Icon -->
          <div class="col-md-6 mb-3">
            <erp-form-field
              labelKey="PAGES.ICON"
              [control]="pageForm.get('icon')"
            >
              <avl-input id="icon" formControlName="icon" [mono]="true" />
            </erp-form-field>
          </div>

          <!-- Module -->
          <div class="col-md-6 mb-3">
            <erp-form-field
              labelKey="PAGES.MODULE"
              [control]="pageForm.get('module')"
            >
              <avl-select id="module" formControlName="module" [options]="modules" [placeholder]="'PAGES.SELECT_MODULE' | translate" />
            </erp-form-field>
          </div>

          <!-- Parent Page -->
          <div class="col-md-6 mb-3">
            <erp-form-field
              labelKey="PAGES.PARENT_PAGE"
              [control]="pageForm.get('parentId')"
            >
              <avl-select
                id="parentId"
                [options]="parentIdOptions"
                [value]="parentIdStringValue"
                (valueChange)="onParentIdChange($event)"
              />
            </erp-form-field>
          </div>

          <!-- Active Status -->
          <div class="col-md-12 mb-3">
            <avl-switch id="active" formControlName="active" [label]="'PAGES.IS_ACTIVE' | translate" />
          </div>
        </div>
      </erp-section>

      <erp-action-bar
        [saveKey]="isEditMode ? 'COMMON.UPDATE' : 'COMMON.SAVE'"
        [loading]="facade.saving()"
        [disabled]="pageForm.invalid || loading"
        [showCancel]="false"
        (saveClicked)="onSave()"
        (backClicked)="onCancel()"
      />
    </form>
    }
  </div>
</app-card>
