<!-- @dsCard group="Components" viewport="700x300" name="Data Display" subtitle="Cards, stats, badges, avatars" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 14px; }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Card, Stat, Badge, Avatar } = window.AVELONDesignSystem_a21abd;
  function Demo() {
    return (
      <div>
        <div className="stats">
          <Stat label="Total Assets" value="48.2M" delta="+3.1%" accent="blue" icon="ti ti-building-bank" />
          <Stat label="Open Journals" value="1,284" delta="+12" accent="teal" icon="ti ti-book" />
          <Stat label="Overdue" value="37" delta="-5" deltaTone="danger" accent="amber" icon="ti ti-clock" />
        </div>
        <Card title="Journal JV-2041" subtitle="General Ledger · Posted" actions={<Badge tone="success">Posted</Badge>}>
          <div className="row">
            <Badge tone="neutral">Draft</Badge>
            <Badge tone="info">Submitted</Badge>
            <Badge tone="success" icon="ti ti-circle-check">Active</Badge>
            <Badge tone="warning" icon="ti ti-clock">Pending</Badge>
            <Badge tone="danger">Rejected</Badge>
            <Badge tone="accent" variant="solid">Growth</Badge>
          </div>
          <div className="row" style={{marginBottom:0}}>
            <Avatar name="Layla Hassan" />
            <Avatar name="Omar Faris" />
            <Avatar name="Sara Noor" />
            <Avatar name="AV" square />
            <span style={{fontSize:'13px',color:'var(--text-muted)'}}>Approvers on this entry</span>
          </div>
        </Card>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
