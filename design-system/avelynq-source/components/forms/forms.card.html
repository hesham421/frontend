<!-- @dsCard group="Components" viewport="700x320" name="Form Controls" subtitle="Inputs, select, checkbox, switch — labels, hints, validation" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 20px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Select, Checkbox, Switch } = window.AVELONDesignSystem_a21abd;
  function Demo() {
    const [v, setV] = React.useState({ code: '1100-0000', cur: 'SAR', remember: true, active: true });
    return (
      <div className="grid">
        <div className="stack">
          <Input label="Account Code" mono iconLeft="ti ti-hash" value={v.code} onChange={e=>setV({...v,code:e.target.value})} required />
          <Select label="Currency" options={['SAR','USD','EUR','AED']} value={v.cur} onChange={e=>setV({...v,cur:e.target.value})} />
          <Input label="Email" placeholder="name@company.com" error="This field is required" />
        </div>
        <div className="stack">
          <Input label="Opening Balance" mono suffix="SAR" placeholder="0.00" hint="Posted at period open" />
          <div style={{display:'flex',flexDirection:'column',gap:'12px',paddingTop:'4px'}}>
            <Checkbox label="Remember this account" checked={v.remember} onChange={e=>setV({...v,remember:e.target.checked})} />
            <Checkbox indeterminate label="Select all sub-accounts" />
            <Switch label="Active" checked={v.active} onChange={e=>setV({...v,active:e.target.checked})} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
