<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); font-family: var(--font-sans); }
  .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: var(--text-subtle); margin-bottom: 10px; }
  .block { margin-bottom: 26px; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
  const { Tabs, Breadcrumb } = window.AVELONDesignSystem_a21abd;
  function Demo() {
    const [t, setT] = React.useState('journals');
    return (
      <div>
        <div className="block">
          <div className="lbl">Breadcrumb</div>
          <Breadcrumb items={['Finance','General Ledger',{label:'Chart of Accounts'}]} />
        </div>
        <div>
          <div className="lbl">Tabs</div>
          <Tabs value={t} onChange={setT} tabs={[
            {id:'details',label:'Details',icon:'ti ti-file-description'},
            {id:'journals',label:'Journals',icon:'ti ti-book',count:12},
            {id:'history',label:'History',icon:'ti ti-history'},
            {id:'audit',label:'Audit Log'},
          ]} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
