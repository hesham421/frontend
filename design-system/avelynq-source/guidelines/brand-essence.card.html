<!-- @dsCard group="Brand" viewport="700x200" name="Essence & Gradient" subtitle="Structure · Growth · Stability — gradient reserved for brand moments" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:0;font-family:var(--font-sans);background:var(--surface-card);}
  .hero{background:var(--navy-850);padding:30px 32px;position:relative;overflow:hidden;}
  .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 55%,color-mix(in srgb,var(--teal-500) 22%,transparent) 100%);}
  .eyebrow{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;background:var(--brand-gradient);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:10px;}
  .tag{font-size:30px;font-weight:700;letter-spacing:-0.02em;color:#fff;line-height:1.1;position:relative;}
  .tag .grow{background:var(--brand-gradient);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .essence{display:flex;gap:10px;margin-top:18px;position:relative;}
  .pill{font-size:12px;font-weight:600;color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:var(--radius-pill);padding:5px 14px;}
  .grad{height:8px;background:var(--brand-gradient);}
</style></head>
<body>
<div class="hero">
  <div class="eyebrow">Brand Essence</div>
  <div class="tag">Built to <span class="grow">Grow.</span> Designed to Endure.</div>
  <div class="essence"><span class="pill">Structure</span><span class="pill">Growth</span><span class="pill">Stability</span></div>
</div>
<div class="grad"></div>
</body></html>
