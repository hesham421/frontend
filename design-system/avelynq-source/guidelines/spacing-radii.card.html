<!-- @dsCard group="Spacing" viewport="700x150" name="Corner Radii" subtitle="Measured, architectural — never pill-soft for data" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:22px 24px;background:var(--surface-card);font-family:var(--font-sans);}
  .row{display:flex;gap:18px;align-items:flex-end;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:64px;height:50px;background:var(--blue-50);border:1.5px solid var(--blue-400);}
  .v{font-family:var(--font-mono);font-size:11px;color:var(--text-strong);}
  .n{font-size:10px;color:var(--text-subtle);}
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="v">3px</div><div class="n">xs</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="v">5px</div><div class="n">sm</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="v">7px</div><div class="n">md · controls</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="v">10px</div><div class="n">lg · cards</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="v">14px</div><div class="n">xl</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-pill);width:50px;height:50px"></div><div class="v">pill</div><div class="n">avatars</div></div>
</div>
</body></html>
