<!-- @dsCard group="Colors" viewport="700x120" name="Blue Scale (Primary)" subtitle="Trust — primary actions, links, focus" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-sans);}
  .scale{display:grid;grid-template-columns:repeat(9,1fr);gap:6px;}
  .cell{display:flex;flex-direction:column;gap:6px;}
  .box{height:54px;border-radius:var(--radius-sm);border:1px solid rgba(10,22,40,.06);}
  .t{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-align:center;}
</style></head>
<body>
<div class="scale">
  <div class="cell"><div class="box" style="background:var(--blue-50)"></div><div class="t">50</div></div>
  <div class="cell"><div class="box" style="background:var(--blue-100)"></div><div class="t">100</div></div>
  <div class="cell"><div class="box" style="background:var(--blue-200)"></div><div class="t">200</div></div>
  <div class="cell"><div class="box" style="background:var(--blue-300)"></div><div class="t">300</div></div>
  <div class="cell"><div class="box" style="background:var(--blue-400)"></div><div class="t">400</div></div>
  <div class="cell"><div class="box" style="background:var(--blue-500);outline:2px solid var(--navy-900);outline-offset:1px"></div><div class="t">500</div></div>
  <div class="cell"><div class="box" style="background:var(--blue-600)"></div><div class="t">600</div></div>
  <div class="cell"><div class="box" style="background:var(--blue-700)"></div><div class="t">700</div></div>
  <div class="cell"><div class="box" style="background:var(--blue-900)"></div><div class="t">900</div></div>
</div>
</body></html>
