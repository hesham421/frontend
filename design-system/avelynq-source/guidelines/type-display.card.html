<!-- @dsCard group="Type" viewport="700x200" name="Display & Headings" subtitle="IBM Plex Sans — tightened tracking, semibold" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:22px 24px;background:var(--surface-card);font-family:var(--font-sans);color:var(--text-strong);}
  .r{display:flex;align-items:baseline;gap:16px;border-bottom:1px solid var(--border-subtle);padding:10px 0;}
  .r:last-child{border-bottom:none;}
  .spec{font-family:var(--font-mono);font-size:11px;color:var(--text-subtle);width:96px;flex-shrink:0;}
  .d{font-size:var(--fs-display);font-weight:700;letter-spacing:var(--ls-display);line-height:1;}
  .h1{font-size:var(--fs-h1);font-weight:600;letter-spacing:var(--ls-heading);}
  .h2{font-size:var(--fs-h2);font-weight:600;letter-spacing:var(--ls-heading);}
  .h3{font-size:var(--fs-h3);font-weight:600;}
</style></head>
<body>
  <div class="r"><span class="spec">Display 44</span><span class="d">Built to Grow.</span></div>
  <div class="r"><span class="spec">H1 · 32 / 600</span><span class="h1">Chart of Accounts</span></div>
  <div class="r"><span class="spec">H2 · 26 / 600</span><span class="h2">General Ledger overview</span></div>
  <div class="r"><span class="spec">H3 · 21 / 600</span><span class="h3">Posting rules &amp; journals</span></div>
</body></html>
