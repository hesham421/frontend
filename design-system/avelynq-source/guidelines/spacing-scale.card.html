<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base grid — structured, predictable" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:22px 24px;background:var(--surface-card);font-family:var(--font-sans);}
  .row{display:flex;align-items:flex-end;gap:16px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .bar{background:var(--brand-primary);border-radius:2px;width:20px;}
  .v{font-family:var(--font-mono);font-size:11px;color:var(--text-strong);}
  .n{font-size:10px;color:var(--text-subtle);}
</style></head>
<body>
<div class="row">
  <div class="item"><div class="bar" style="height:4px"></div><div class="v">4</div><div class="n">space-1</div></div>
  <div class="item"><div class="bar" style="height:8px"></div><div class="v">8</div><div class="n">space-2</div></div>
  <div class="item"><div class="bar" style="height:12px"></div><div class="v">12</div><div class="n">space-3</div></div>
  <div class="item"><div class="bar" style="height:16px"></div><div class="v">16</div><div class="n">space-4</div></div>
  <div class="item"><div class="bar" style="height:24px"></div><div class="v">24</div><div class="n">space-6</div></div>
  <div class="item"><div class="bar" style="height:32px"></div><div class="v">32</div><div class="n">space-7</div></div>
  <div class="item"><div class="bar" style="height:48px"></div><div class="v">48</div><div class="n">space-9</div></div>
  <div class="item"><div class="bar" style="height:64px"></div><div class="v">64</div><div class="n">space-10</div></div>
</div>
</body></html>
