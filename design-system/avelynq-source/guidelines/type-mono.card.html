<!-- @dsCard group="Type" viewport="700x180" name="Mono / Data" subtitle="IBM Plex Mono — codes, GL numbers, amounts" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:22px 24px;background:var(--surface-card);font-family:var(--font-mono);}
  table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:14px;}
  th{font-family:var(--font-sans);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-subtle);text-align:left;padding:6px 10px;border-bottom:1px solid var(--border-default);}
  td{padding:8px 10px;border-bottom:1px solid var(--border-subtle);color:var(--text-strong);}
  td.num{text-align:right;}
  .pos{color:var(--green-600);}.neg{color:var(--red-600);}
</style></head>
<body>
<table>
  <thead><tr><th>Account</th><th>Code</th><th style="text-align:right">Debit</th><th style="text-align:right">Credit</th></tr></thead>
  <tbody>
    <tr><td style="font-family:var(--font-sans)">Cash &amp; Equivalents</td><td>1100-0000</td><td class="num">482,150.00</td><td class="num">—</td></tr>
    <tr><td style="font-family:var(--font-sans)">Accounts Payable</td><td>2100-0400</td><td class="num">—</td><td class="num neg">128,940.50</td></tr>
    <tr><td style="font-family:var(--font-sans)">Retained Earnings</td><td>3200-0100</td><td class="num">—</td><td class="num pos">1,204,775.25</td></tr>
  </tbody>
</table>
</body></html>
