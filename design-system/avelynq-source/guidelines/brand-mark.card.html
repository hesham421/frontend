<!-- @dsCard group="Brand" viewport="700x220" name="Mark & App Icon" subtitle="The triangle — intentional ascent on stable foundation" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:24px;background:var(--surface-card);font-family:var(--font-sans);display:flex;gap:20px;align-items:stretch;}
  .tile{flex:1;border-radius:var(--radius-lg);border:1px solid var(--border-subtle);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;}
  .dark{background:var(--navy-850);}
  .light{background:var(--slate-50);}
  .tile img{height:120px;width:auto;}
  .appicon img{height:120px;border-radius:26px;box-shadow:var(--shadow-lg);}
  .lab{font-size:11px;letter-spacing:.1em;text-transform:uppercase;}
  .dark .lab{color:rgba(255,255,255,.6);}
  .light .lab{color:var(--text-subtle);}
</style></head>
<body>
  <div class="tile dark"><img src="../assets/avelynq-mark-dark.png" alt="AVELYNQ mark" /><span class="lab">Mark</span></div>
  <div class="tile light appicon"><img src="../assets/avelynq-appicon.png" alt="AVELYNQ app icon" /><span class="lab">App Icon</span></div>
</body></html>
