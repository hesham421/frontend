<!-- @dsCard group="Type" viewport="700x180" name="Arabic / Bilingual" subtitle="IBM Plex Sans Arabic — RTL parity" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:22px 24px;background:var(--surface-card);}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
  .col h3{font-family:var(--font-sans);font-size:var(--fs-h3);font-weight:600;color:var(--text-strong);margin:0 0 8px;}
  .col p{font-family:var(--font-sans);font-size:var(--fs-body);color:var(--text-body);line-height:var(--lh-relaxed);margin:0;}
  .ar{direction:rtl;font-family:var(--font-arabic);}
  .ar h3{font-family:var(--font-arabic);}
  .ar p{font-family:var(--font-arabic);}
  .eyebrow{font-size:var(--fs-2xs);font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-subtle);margin-bottom:6px;}
</style></head>
<body>
<div class="grid">
  <div class="col">
    <div class="eyebrow">English · LTR</div>
    <h3>Built to Grow.</h3>
    <p>Systems built to grow — without breaking what already works.</p>
  </div>
  <div class="col ar">
    <div class="eyebrow" style="letter-spacing:0">عربي · RTL</div>
    <h3>صُمم لينمو.</h3>
    <p>أنظمة تُبنى لتنمو، دون أن تكسر ما يعمل بالفعل.</p>
  </div>
</div>
</body></html>
