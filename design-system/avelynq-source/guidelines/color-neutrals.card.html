<!-- @dsCard group="Colors" viewport="700x130" name="Slate Neutrals" subtitle="Cool-tinted neutral scale — text, borders, surfaces" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-sans);}
  .scale{display:grid;grid-template-columns:repeat(11,1fr);gap:5px;}
  .cell{display:flex;flex-direction:column;gap:6px;}
  .box{height:54px;border-radius:var(--radius-sm);border:1px solid rgba(10,22,40,.08);}
  .t{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-align:center;}
</style></head>
<body>
<div class="scale">
  <div class="cell"><div class="box" style="background:var(--slate-0)"></div><div class="t">0</div></div>
  <div class="cell"><div class="box" style="background:var(--slate-50)"></div><div class="t">50</div></div>
  <div class="cell"><div class="box" style="background:var(--slate-100)"></div><div class="t">100</div></div>
  <div class="cell"><div class="box" style="background:var(--slate-200)"></div><div class="t">200</div></div>
  <div class="cell"><div class="box" style="background:var(--slate-300)"></div><div class="t">300</div></div>
  <div class="cell"><div class="box" style="background:var(--slate-400)"></div><div class="t">400</div></div>
  <div class="cell"><div class="box" style="background:var(--slate-500)"></div><div class="t">500</div></div>
  <div class="cell"><div class="box" style="background:var(--slate-600)"></div><div class="t">600</div></div>
  <div class="cell"><div class="box" style="background:var(--slate-700)"></div><div class="t">700</div></div>
  <div class="cell"><div class="box" style="background:var(--slate-800)"></div><div class="t">800</div></div>
  <div class="cell"><div class="box" style="background:var(--slate-950)"></div><div class="t">950</div></div>
</div>
</body></html>
