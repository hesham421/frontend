<!-- @dsCard group="Brand" viewport="700x300" name="Logo Lockup" subtitle="Official primary lockup — on navy and on light" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:0;background:var(--surface-card);font-family:var(--font-sans);}
  .stage{background:#00030e;padding:34px 40px;display:flex;align-items:center;justify-content:center;}
  .stage img{height:108px;width:auto;}
  .light{background:#fefefe;border-top:1px solid var(--border-subtle);padding:26px 40px;display:flex;align-items:center;justify-content:center;}
  .light img{height:84px;width:auto;}
  .cap{padding:11px 24px;font-size:12px;color:var(--text-muted);display:flex;justify-content:space-between;border-top:1px solid var(--border-subtle);}
  .cap b{color:var(--text-strong);font-weight:600;}
</style></head>
<body>
<div class="stage"><img src="../assets/avelynq-lockup-dark.png" alt="AVELYNQ lockup on navy" /></div>
<div class="light"><img src="../assets/avelynq-lockup-light.png" alt="AVELYNQ lockup on light" /></div>
<div class="cap"><span><b>Clear space:</b> ≥ height of the mark on all sides</span><span>Use on the deep-navy brand field or on white</span></div>
</body></html>
