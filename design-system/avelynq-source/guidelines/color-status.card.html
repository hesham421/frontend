<!-- @dsCard group="Colors" viewport="700x150" name="Status Colors" subtitle="Restrained semantic set — soft bg + solid fg" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-sans);}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .item{display:flex;flex-direction:column;gap:8px;}
  .pair{display:flex;height:48px;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle);}
  .solid{flex:1;}.soft{flex:1;}
  .badge{display:inline-flex;align-items:center;justify-content:center;height:22px;padding:0 9px;border-radius:var(--radius-sm);font-size:11px;font-weight:600;}
  .lab{font-size:11px;color:var(--text-muted);}
</style></head>
<body>
<div class="row">
  <div class="item"><div class="pair"><div class="solid" style="background:var(--green-600)"></div><div class="soft" style="background:var(--green-50)"></div></div><span class="badge" style="background:var(--green-50);color:var(--green-700)">Success</span></div>
  <div class="item"><div class="pair"><div class="solid" style="background:var(--blue-500)"></div><div class="soft" style="background:var(--info-50)"></div></div><span class="badge" style="background:var(--info-50);color:var(--blue-700)">Info</span></div>
  <div class="item"><div class="pair"><div class="solid" style="background:var(--amber-600)"></div><div class="soft" style="background:var(--amber-50)"></div></div><span class="badge" style="background:var(--amber-50);color:var(--amber-700)">Warning</span></div>
  <div class="item"><div class="pair"><div class="solid" style="background:var(--red-600)"></div><div class="soft" style="background:var(--red-50)"></div></div><span class="badge" style="background:var(--red-50);color:var(--red-700)">Danger</span></div>
  <div class="item"><div class="pair"><div class="solid" style="background:var(--slate-600)"></div><div class="soft" style="background:var(--slate-100)"></div></div><span class="badge" style="background:var(--slate-100);color:var(--slate-700)">Neutral</span></div>
</div>
</body></html>
