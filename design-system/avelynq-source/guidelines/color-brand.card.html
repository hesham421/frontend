<!-- @dsCard group="Colors" viewport="700x180" name="Brand Core" subtitle="Navy foundation · Blue (trust) · Teal (growth) · Steel" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-sans);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .sw{border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle);}
  .chip{height:74px;display:flex;align-items:flex-end;padding:8px 10px;}
  .chip .on{font-size:11px;font-weight:600;color:#fff;opacity:.9;}
  .meta{padding:8px 10px;}
  .name{font-size:12px;font-weight:600;color:var(--text-strong);}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-transform:uppercase;}
  .role{font-size:10px;color:var(--text-subtle);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
</style></head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--navy-850)"><span class="on">Foundation</span></div><div class="meta"><div class="name">Navy / Ink</div><div class="hex">#0A1628</div><div class="role">Surfaces · Shell</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-500)"><span class="on">Primary</span></div><div class="meta"><div class="name">Avelynq Blue</div><div class="hex">#2466D8</div><div class="role">Trust · Actions</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--teal-500)"><span class="on">Accent</span></div><div class="meta"><div class="name">Avelynq Teal</div><div class="hex">#12A99B</div><div class="role">Growth · Ascent</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--steel-400)"><span class="on" style="color:var(--navy-900)">Metal</span></div><div class="meta"><div class="name">Steel</div><div class="hex">#AEB4BF</div><div class="role">The arch · Neutral</div></div></div>
</div>
</body></html>
