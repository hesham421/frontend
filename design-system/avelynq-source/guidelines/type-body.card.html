<!-- @dsCard group="Type" viewport="700x210" name="Body & UI Text" subtitle="IBM Plex Sans — 14px default, dense-friendly" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:22px 24px;background:var(--surface-card);font-family:var(--font-sans);}
  .r{display:flex;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px solid var(--border-subtle);}
  .r:last-child{border-bottom:none;}
  .spec{font-family:var(--font-mono);font-size:11px;color:var(--text-subtle);width:110px;flex-shrink:0;}
  .title{font-size:var(--fs-title);font-weight:600;color:var(--text-strong);}
  .body{font-size:var(--fs-body);color:var(--text-body);line-height:var(--lh-normal);}
  .sm{font-size:var(--fs-sm);color:var(--text-muted);}
  .xs{font-size:var(--fs-xs);color:var(--text-muted);}
  .eyebrow{font-size:var(--fs-2xs);font-weight:600;letter-spacing:var(--ls-eyebrow);text-transform:uppercase;color:var(--text-subtle);}
</style></head>
<body>
  <div class="r"><span class="spec">Title · 16 / 600</span><span class="title">Account details</span></div>
  <div class="r"><span class="spec">Body · 14 / 400</span><span class="body">Manage system users, roles, and access control across every module.</span></div>
  <div class="r"><span class="spec">Small · 13</span><span class="sm">Posted at period open · updated 2 hours ago</span></div>
  <div class="r"><span class="spec">Caption · 12</span><span class="xs">Showing 1–25 of 1,284 records</span></div>
  <div class="r"><span class="spec">Eyebrow · 11</span><span class="eyebrow">Built to Grow · Designed to Endure</span></div>
</body></html>
